# extra-toolchain.yml — Block for projects needing an external binary for tests
# Pattern sourced from bka-go (Typst renderer required for integration tests).
#
# Insert the appropriate install step into the `test` job (and `integration-test`
# job if the project separates unit and integration tests) AFTER `Setup Go`.
#
# Placeholder: {{TOOL_NAME}}, {{TOOL_VERSION}}, {{TOOL_DOWNLOAD_URL}}
#
# The install step is pinned to a specific version and uses a env var
# so Renovate can track it (add a customManager entry in renovate.json).

# ── Env var (add to job env or top-level env block) ──
# {{TOOL_NAME_UPPER}}_VERSION: "{{TOOL_VERSION}}"

# ── Step: Install extra toolchain binary ──
- name: Install {{TOOL_NAME}}
  run: |
    curl -fsSL "{{TOOL_DOWNLOAD_URL}}" \
      | tar -xJ --strip-components=1 {{TOOL_NAME}}-*-linux-musl/{{TOOL_NAME}}
    sudo mv {{TOOL_NAME}} /usr/local/bin/
    {{TOOL_NAME}} --version

# ────────────────────────────────────────────────────
# renovate.json customManager entry needed:
# ────────────────────────────────────────────────────
# {
#   "description": "Update {{TOOL_NAME}} version in CI",
#   "customType": "regex",
#   "fileMatch": ["\\.github/workflows/.*\\.ya?ml$"],
#   "matchStrings": [
#     "{{TOOL_NAME_UPPER}}_VERSION: \"(?<currentValue>[^\"]+)\""
#   ],
#   "datasourceTemplate": "github-releases",
#   "depNameTemplate": "<github-org>/{{TOOL_NAME}}"
# }

# ────────────────────────────────────────────────────
# Common examples:
# ────────────────────────────────────────────────────
#
# Typst ({{TOOL_NAME}}=typst, {{TOOL_VERSION}}=0.14.2):
#   URL: https://github.com/typst/typst/releases/download/v${VERSION}/typst-x86_64-unknown-linux-musl.tar.xz
#
# Pandoc:
#   URL: https://github.com/jgm/pandoc/releases/download/${VERSION}/pandoc-${VERSION}-linux-amd64.tar.gz
#
# Hugo:
#   URL: https://github.com/gohugoio/hugo/releases/download/v${VERSION}/hugo_extended_${VERSION}_linux-amd64.tar.gz
